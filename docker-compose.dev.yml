# Local development: source bind-mount + auto-reload (no image rebuild on code edits).
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  app:
    volumes:
      - .:/app
      - app_uploads:/app/uploads
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
