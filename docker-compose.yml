services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: calovia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calovia"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - calovia

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads
    env_file:
      - .env
    environment:
      # Overrides host-oriented DATABASE_URL from .env when the API runs in this network.
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/calovia
    ports:
      - "${APP_PUBLISH_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)",
        ]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 50s
    restart: unless-stopped
    networks:
      - calovia

networks:
  calovia:
    driver: bridge

volumes:
  postgres_data:
  app_uploads:
